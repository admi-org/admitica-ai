<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Лист ожидания — Admitica</title>
  <meta name="description" content="Оставьте контакт, чтобы первыми получить доступ к полной версии Admitica." />
  <meta name="robots" content="noindex, follow" />

  <!-- Та же тема, что у приложения (ключ admitica.theme). По умолчанию — тёмная. -->
  <script>
    try {
      var t = JSON.parse(localStorage.getItem("admitica.theme"));
      if (t === "light") document.documentElement.dataset.theme = "light";
    } catch (e) {}
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ===== Дизайн-токены Admitica (зеркало app/src/index.css) ===== */
    :root {
      --bg:#0a0c0c; --surface:#101414; --card:#151a1a; --card-2:#1b2121;
      --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.14);
      --fg:#f4f7f6; --fg-muted:#99a3a1; --fg-faint:#5e6766;
      --accent:#2dd4bf; --accent-soft:rgba(45,212,191,0.12);
      --accent-fg:#04201d; --accent-text:#2dd4bf; --accent-glow:rgba(45,212,191,0.30);
      --radius:1.25rem;
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg:#f3f7f6; --surface:#ffffff; --card:#ffffff; --card-2:#e9f1ef;
      --border:rgba(12,40,36,0.10); --border-strong:rgba(12,40,36,0.18);
      --fg:#0d1a18; --fg-muted:#4c5a58; --fg-faint:#7a8987;
      --accent:#0d9488; --accent-soft:rgba(13,148,136,0.12);
      --accent-fg:#ffffff; --accent-text:#0f766e; --accent-glow:rgba(13,148,136,0.18);
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0; min-height: 100vh; min-height: 100dvh;
      background:
        radial-gradient(900px 480px at 50% -10%, var(--accent-glow), transparent 70%),
        var(--bg);
      color: var(--fg);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 16px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
      padding: 24px max(16px, env(safe-area-inset-left)) calc(24px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right));
    }

    .card {
      width: 100%; max-width: 560px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(0,0,0,0.20), 0 24px 60px -32px rgba(0,0,0,0.55);
      padding: 36px;
    }

    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 17px; letter-spacing: -0.01em;
      color: var(--fg); text-decoration: none; margin-bottom: 20px;
    }
    .brand__dot { color: var(--accent-text); }

    .eyebrow {
      display: inline-block; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--accent-text); background: var(--accent-soft);
      padding: 5px 10px; border-radius: 999px; margin-bottom: 14px;
    }

    h1 {
      color: var(--fg); font-size: 26px; line-height: 1.25; font-weight: 800;
      letter-spacing: -0.02em; margin: 0 0 10px;
    }
    .lead { color: var(--fg-muted); font-size: 16px; margin: 0 0 24px; }

    /* ===== Слот под Яндекс Форму ===== */
    .form-slot {
      border: 1.5px dashed var(--border-strong); border-radius: 14px;
      background: var(--card-2); min-height: 320px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; text-align: center; padding: 32px 20px; color: var(--fg-faint);
    }
    .form-slot strong { color: var(--fg); font-weight: 600; font-size: 15px; }
    .form-slot span { font-size: 13px; max-width: 360px; }
    .form-slot code { color: var(--accent-text); }
    /* Когда внутрь вставлен iframe Яндекс Формы — убираем рамку-плейсхолдер и
       прячем текст-заглушку (:has() — baseline во всех браузерах с 2023 г.). */
    .form-slot:has(iframe) {
      border: none; background: transparent; padding: 0; min-height: 0; display: block;
    }
    .form-slot:has(iframe) > :not(iframe) { display: none; }
    .form-slot iframe { width: 100%; border: none; display: block; }

    .foot { margin-top: 22px; font-size: 13px; color: var(--fg-faint); text-align: center; }
    .foot a { color: var(--accent-text); text-decoration: underline; text-underline-offset: 2px; }
    .foot a:hover { opacity: 0.85; }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    @media (max-width: 600px) {
      .card { padding: 24px; border-radius: 18px; }
      h1 { font-size: 22px; }
      .form-slot { min-height: 260px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <a class="brand" href="./" aria-label="На главную Admitica">
      <span>Admitica<span class="brand__dot">.</span></span>
    </a>

    <span class="eyebrow">Лист ожидания</span>
    <h1>Спасибо! Оставьте контакт</h1>
    <p class="lead">Заполните короткую форму ниже — и мы позовём вас первыми, когда откроем полную версию Admitica. Это займёт меньше минуты.</p>

    <!-- НАЧАЛО ЯНДЕКС-ФОРМЫ -->
    <div class="form-slot">
      <iframe
        src="https://forms.yandex.ru/u/6a32850902848f0660bf3bb1?iframe=1"
        name="ya-form-6a32850902848f0660bf3bb1"
        title="Форма листа ожидания Admitica"
        frameborder="0"
        height="600"
        style="width:100%;border:0;"
      ></iframe>
    </div>
    <!-- КОНЕЦ ЯНДЕКС-ФОРМЫ -->

    <p class="foot">
      Отправляя форму, вы соглашаетесь с обработкой персональных данных согласно
      <a href="./privacy.html" target="_blank" rel="noopener">Политике конфиденциальности</a>.
    </p>
  </main>

  <!-- Авто-подгон высоты iframe под содержимое формы (официальный скрипт Яндекс Форм). -->
  <script src="https://forms.yandex.ru/_static/embed.js"></script>
</body>
</html>
